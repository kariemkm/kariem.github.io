<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بورتفوليو احترافي | 2026</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* الأساسيات */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
            cursor: none; /* بنخفي الماوس عشان هنعمل واحد مخصوص */
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* الماوس المخصص */
        #cursor {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* الخلفية المتحركة (Mesh Gradient) */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        /* الهيدر */
        nav {
            padding: 2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 1;
            margin-bottom: 1rem;
        }

        .glow-text {
            color: var(--primary);
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        }

        /* كروت المشاريع */
        .container {
            padding: 100px 10%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
        }

        .project-img {
            width: 100%;
            height: 200px;
            background: #222;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .project-img::after {
            content: "PREVIEW";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: 0.3s;
        }

        .glass-card:hover .project-img::after {
            opacity: 1;
        }

        /* زر الأكشن */
        .btn {
            padding: 15px 35px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 30px var(--primary);
        }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="gradient-bg">
        <div class="blob"></div>
    </div>

    <nav>
        <div class="logo">PORTFOLIO.26</div>
        <div class="btn" style="padding: 10px 20px;">Contact</div>
    </nav>

    <header>
        <h1 data-aos="fade-down" data-aos-duration="1000">نصمم <span class="glow-text">المستقبل</span></h1>
        <p data-aos="fade-up" data-aos-delay="300">مطور واجهات أمامية متخصص في التجارب البصرية الفريدة</p>
        <br>
        <div data-aos="zoom-in" data-aos-delay="600">
            <button class="btn">رؤية أعمالي</button>
        </div>
    </header>

    <section class="container">
        <h2 style="margin-bottom: 50px; font-size: 2.5rem;" data-aos="fade-right">المشاريع المختارة</h2>
        <div class="grid">
            <div class="glass-card" data-aos="flip-left">
                <div class="project-img"></div>
                <h3>تطبيق ميتافيرس</h3>
                <p>تجربة واقع افتراضي بالكامل باستخدام Three.js</p>
            </div>
            <div class="glass-card" data-aos="flip-left" data-aos-delay="200">
                <div class="project-img"></div>
                <h3>منصة AI للصور</h3>
                <p>واجهة مستخدم ذكية مبنية بـ React و Tailwind</p>
            </div>
            <div class="glass-card" data-aos="flip-left" data-aos-delay="400">
                <div class="project-img"></div>
                <h3>براندينج تقني</h3>
                <p>هوية بصرية كاملة لشركة برمجيات ناشئة</p>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // تشغيل مكتبة الأنميشن
        AOS.init({
            duration: 800,
            once: false,
            mirror: true
        });

        // كود الماوس المخصص
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // تفاعل الماوس مع الزراير
        document.querySelectorAll('.btn, .glass-card').forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(4)';
                cursor.style.background = 'white';
            });
            item.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.background = '#00f2ff';
            });
        });
    </script>
</body>
</html>
